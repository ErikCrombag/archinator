name: CI / Build / Push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps
        run: pip install -e "backend/[dev]" lxml pytest

      - name: Run tests
        run: python -m pytest tests/ -v -m "not integration"


  # ── Build & push images ─────────────────────────────────────────────────────
  build-and-push:
    needs: test
    # Only push on main branch pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/archinator-backend:latest
            ghcr.io/${{ env.OWNER }}/archinator-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/archinator-frontend:latest
            ghcr.io/${{ env.OWNER }}/archinator-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    # ── Deploy ─────────────────────────────────────────────────────

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy Caddy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "deploy/Caddyfile"
          target: /tmp/arch-deploy
          strip_components: 1

      - name: SSH to VPS and redeploy Caddy + app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            cp /tmp/arch-deploy/Caddyfile /docker/infra/sites/Archinator
            cd /docker/infra
            docker compose up -d --remove-orphans
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
            ssh -i ~/.ssh/ai_server -o StrictHostKeyChecking=no erik@ai-server \
              "cd /home/erik/docker/archinator && docker compose pull && docker compose up -d --remove-orphans"