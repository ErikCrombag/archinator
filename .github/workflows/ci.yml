name: CI / Build / Push

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps
        run: pip install -e "backend/[dev]" lxml pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify render_rules_md
        run: python scripts/render_rules_md.py --output /tmp/rules_core.md

  # ── Build & push images ─────────────────────────────────────────────────────
  build-push:
    needs: test
    # Only push on main branch pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/archinator-backend:latest
            ghcr.io/${{ github.repository_owner }}/archinator-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/archinator-frontend:latest
            ghcr.io/${{ github.repository_owner }}/archinator-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
