services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/archinator-backend:${IMAGE_TAG:-latest}
    build:
      context: .           # repo root — gives Dockerfile access to training/
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # rules_core.md is baked into the image at build time — not mounted.
      # chroma/ and archinator.db persist across restarts via bind mounts.
      # semantic_core.md is optional (written by bootstrap); pre-created by deploy.sh.
      - ./data/chroma:/app/data/chroma
      - ./data/archinator.db:/app/data/archinator.db
      - ./data/semantic_core.md:/app/data/semantic_core.md
      - ./training/training_data/sources.txt:/app/data/sources.txt
      - ./training/training_data/books:/app/data/books
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama4:16x17b}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-65536}
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      DB_PATH: /app/data/archinator.db
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - internal
      - ai-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/${GHCR_OWNER}/archinator-frontend:${IMAGE_TAG:-latest}
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://10.1.0.2:8000}
    networks:
      - internal
    depends_on:
      - backend

networks:
  internal:
    driver: bridge
  ai-net:
    external: true   # created once: docker network create ai-net
